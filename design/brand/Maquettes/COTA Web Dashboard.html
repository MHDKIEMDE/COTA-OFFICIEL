<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>COTA — Dashboard Web (Espace membre)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:#0b0d10; --bg2:#15181d; --bg3:#1a1e25; --line:#1d2026; --line2:#2a2e36;
    --ink:#f4efe2; --ink2:#c7c4b8; --dim:#8b8a85; --dim2:#5a5d63;
    --accent:#e8ff36; --win:#3ddc91; --loss:#ff5b3a;
    --ui:"Space Grotesk", system-ui, sans-serif;
    --title:"Archivo Black","Archivo",sans-serif;
    --mono:"JetBrains Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); font-family:var(--ui); -webkit-font-smoothing:antialiased; color:var(--ink); }
  #root { min-height:100vh; }
  ::-webkit-scrollbar { width:9px; height:9px; }
  ::-webkit-scrollbar-thumb { background:var(--line2); border-radius:5px; }
  ::-webkit-scrollbar-track { background:transparent; }

  @keyframes cota-live-pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .wd-shell { display:flex; min-height:100vh; }

  /* Sidebar */
  .wd-sidebar { width:248px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:22px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .wd-brand { display:flex; align-items:center; gap:11px; padding:0 6px; }
  .wd-profile { display:flex; flex-direction:column; align-items:center; text-align:center; padding:22px 0 20px; margin-top:18px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .wd-nav { display:flex; flex-direction:column; gap:3px; margin-top:16px; flex:1; }
  .wd-navsep { height:1px; background:var(--line); margin:10px 8px; }
  .wd-navitem { display:flex; align-items:center; gap:12px; padding:11px 13px; border-radius:10px;
    font-size:13.5px; color:var(--dim); cursor:pointer; text-decoration:none; letter-spacing:-0.01em; transition:background .15s,color .15s; }
  .wd-navitem:hover { background:var(--bg3); color:var(--ink2); }
  .wd-navitem.on { background:rgba(232,255,54,0.08); color:var(--accent); box-shadow:inset 3px 0 0 var(--accent); font-weight:600; }
  .wd-logout { margin-top:6px; }

  /* Main */
  .wd-main { flex:1; min-width:0; padding:26px 30px 64px; }
  .wd-topbar { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:20px; }
  .wd-topactions { display:flex; align-items:center; gap:10px; }
  .wd-iconbtn { width:42px; height:42px; border-radius:11px; background:var(--bg2); border:1px solid var(--line);
    color:var(--ink); display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; }
  .wd-dot { position:absolute; top:10px; right:11px; width:7px; height:7px; border-radius:4px; background:var(--accent); }
  .wd-cta { display:flex; align-items:center; gap:7px; background:var(--accent); color:var(--bg); border:none; border-radius:11px;
    padding:0 18px; height:42px; font-family:var(--title); font-size:12.5px; letter-spacing:0.02em; cursor:pointer; white-space:nowrap; }

  /* Filter bar */
  .wd-filterbar { display:flex; gap:10px; align-items:stretch; margin-bottom:22px; }
  .wd-search { flex:1.6; display:flex; align-items:center; gap:10px; background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:0 16px; }
  .wd-search input { flex:1; background:transparent; border:none; outline:none; color:var(--ink); font-family:var(--ui); font-size:13.5px; padding:14px 0; }
  .wd-search input::placeholder { color:var(--dim2); }
  .wd-filter { flex:1; text-align:left; background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:9px 14px; cursor:pointer; display:flex; flex-direction:column; }
  .wd-filter:hover, .wd-iconbtn:hover { border-color:var(--line2); }
  .wd-filterbtn { background:var(--accent); color:var(--bg); border:none; border-radius:12px; padding:0 20px; font-family:var(--title); font-size:12.5px; display:flex; align-items:center; gap:7px; cursor:pointer; white-space:nowrap; }

  /* KPI */
  .wd-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px; }
  .wd-kpi { display:flex; background:var(--bg2); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  .wd-kpi-shape { width:58px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg3); border-right:1px solid var(--line); }
  .wd-kpi-body { padding:16px 18px; }

  /* Columns */
  .wd-cols { display:grid; grid-template-columns:minmax(0,1fr) 332px; gap:22px; align-items:start; }
  .wd-maincol { display:flex; flex-direction:column; gap:22px; min-width:0; }
  .wd-rail { display:flex; flex-direction:column; gap:22px; }
  .wd-chartrow { display:grid; grid-template-columns:minmax(0,1.55fr) minmax(0,1fr); gap:22px; }

  /* Panel */
  .wd-panel { background:var(--bg2); border:1px solid var(--line); border-radius:16px; }
  .wd-panelhead { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:20px 22px 16px; }
  .wd-morelink { font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:0.1em; cursor:pointer; white-space:nowrap; }
  .wd-morelink:hover { color:var(--accent); }

  /* Matches */
  .wd-matches { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .wd-matchcard { background:var(--bg3); border:1px solid var(--line); border-radius:14px; overflow:hidden; }

  /* Table */
  .wd-table { width:100%; }
  .wd-tr { display:grid; grid-template-columns:2.4fr 1.7fr 0.7fr 1fr 0.9fr; align-items:center; gap:12px; padding:14px 22px; border-top:1px solid var(--line); }
  .wd-tr:not(.wd-thead):hover { background:rgba(255,255,255,0.015); }
  .wd-thead { border-top:none; padding-top:2px; padding-bottom:13px; }
  .wd-thead .wd-cell { font-family:var(--mono); font-size:9.5px; color:var(--dim); letter-spacing:0.14em; }
  .wd-c-match { display:flex; align-items:center; gap:12px; min-width:0; }
  .wd-c-gain, .wd-c-odds { text-align:right; justify-self:end; }
  .wd-thumb { width:46px; height:38px; border-radius:9px; overflow:hidden; position:relative; flex-shrink:0; }
  .wd-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.03em; white-space:nowrap; }
  .wd-livedot { width:6px; height:6px; border-radius:3px; background:currentColor; animation:cota-live-pulse 1.4s ease-in-out infinite; }

  /* Page header back btn */
  .wd-back { display:inline-flex; align-items:center; gap:6px; background:none; border:none; color:var(--dim); font-family:var(--ui); font-size:12.5px; cursor:pointer; padding:0; }
  .wd-back:hover { color:var(--ink); }

  /* CTA block */
  .wd-cta-block { width:100%; justify-content:center; height:46px; }

  /* Prediction grid + card */
  .wd-pgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
  .wd-pcard { background:var(--bg2); border:1px solid var(--line); border-radius:16px; overflow:hidden; cursor:pointer; transition:border-color .15s, transform .15s; }
  .wd-pcard:hover { border-color:var(--line2); transform:translateY(-2px); }
  .wd-pcard-foot { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:13px; border-top:1px solid var(--line); }

  /* Prediction detail */
  .wd-detail { display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:22px; align-items:start; }
  .wd-detail-main { min-width:0; }
  .wd-detail-rail { display:flex; flex-direction:column; gap:18px; }

  /* Live */
  .wd-livegrid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
  .wd-livecard { cursor:pointer; transition:border-color .15s; }
  .wd-livecard:hover { border-color:var(--line2); }

  /* Competitions */
  .wd-cgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .wd-ccard { overflow:hidden; }
  .wd-cbanner { height:96px; display:flex; align-items:center; justify-content:center; position:relative; }

  /* Favorites */
  .wd-teamrow { display:flex; flex-wrap:wrap; gap:12px; }
  .wd-teamchip { display:flex; align-items:center; gap:10px; padding:10px 14px 10px 10px; background:var(--bg3); border:1px solid var(--line); border-radius:999px; }
  .wd-teamadd { cursor:pointer; border-style:dashed; padding:10px 18px; gap:8px; }

  /* Plans */
  .wd-plans { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; align-items:start; }
  .wd-plan { padding:26px 24px; position:relative; }
  .wd-plan-hot { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .wd-plan-ribbon { position:absolute; top:-1px; right:22px; background:var(--accent); color:var(--bg); font-family:var(--mono); font-size:9.5px; font-weight:700; letter-spacing:0.14em; padding:5px 11px; border-radius:0 0 8px 8px; }
  .wd-plan-btn { width:100%; height:44px; border-radius:11px; background:var(--bg3); border:1px solid var(--line2); color:var(--ink); font-family:var(--ui); font-size:13px; font-weight:600; cursor:pointer; }
  .wd-plan-btn:hover:not(:disabled) { border-color:var(--accent); }
  .wd-plan-cta { background:var(--accent); border:none; color:var(--bg); font-family:var(--title); letter-spacing:0.02em; }
  .wd-plan-current { background:transparent; color:var(--dim); cursor:default; border-style:dashed; }

  /* Toggle */
  .wd-toggle { width:42px; height:24px; border-radius:12px; background:var(--bg3); border:1px solid var(--line2); position:relative; flex-shrink:0; transition:background .15s; }
  .wd-toggle.on { background:var(--accent); border-color:var(--accent); }
  .wd-toggle-knob { position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--dim); transition:left .15s, background .15s; }
  .wd-toggle.on .wd-toggle-knob { left:20px; background:var(--bg); }

  /* Referral */
  .wd-refhero { padding:26px 24px; }
  .wd-refcode { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:12px; padding:16px 20px; background:var(--bg3); border:1px dashed var(--line2); border-radius:13px; }

  /* Density */
  .wd-main.wd-compact .wd-kpis, .wd-main.wd-compact .wd-cols, .wd-main.wd-compact .wd-maincol,
  .wd-main.wd-compact .wd-rail, .wd-main.wd-compact .wd-chartrow, .wd-main.wd-compact .wd-matches { gap:14px; }
  .wd-main.wd-compact .wd-tr { padding-top:11px; padding-bottom:11px; }

  /* Responsive */
  @media (max-width:1180px) {
    .wd-cols { grid-template-columns:1fr; }
    .wd-rail { display:grid; grid-template-columns:1fr 1fr; }
    .wd-detail { grid-template-columns:1fr; }
    .wd-cgrid { grid-template-columns:repeat(2,1fr); }
  }
  @media (max-width:960px) {
    .wd-chartrow { grid-template-columns:1fr; }
    .wd-kpis { grid-template-columns:repeat(2,1fr); }
    .wd-matches { grid-template-columns:1fr 1fr; }
    .wd-pgrid, .wd-livegrid, .wd-plans { grid-template-columns:1fr; }
    .wd-filterbar { flex-wrap:wrap; }
    .wd-search { flex-basis:100%; }
    .wd-filter { flex-basis:calc(50% - 5px); }
  }
  @media (max-width:760px) {
    .wd-shell { flex-direction:column; }
    .wd-sidebar { width:auto; height:auto; position:sticky; top:0; z-index:20; flex-direction:row; align-items:center; padding:12px 14px; gap:10px; }
    .wd-brand { padding:0; }
    .wd-profile { display:none; }
    .wd-nav { flex-direction:row; overflow-x:auto; margin-top:0; gap:6px; -ms-overflow-style:none; scrollbar-width:none; }
    .wd-nav::-webkit-scrollbar { display:none; }
    .wd-navitem { padding:9px 11px; white-space:nowrap; }
    .wd-navitem.on { box-shadow:inset 0 -3px 0 var(--accent); }
    .wd-logout { display:none; }
    .wd-main { padding:18px 16px 56px; }
    .wd-rail { grid-template-columns:1fr; }
    .wd-matches { grid-template-columns:1fr; }
    .wd-cgrid { grid-template-columns:1fr; }
    .wd-detail-rail { gap:14px; }
    .wd-table .wd-tr { grid-template-columns:1.8fr 1fr 0.9fr; }
    .wd-c-pick, .wd-c-odds, .wd-thead .wd-c-pick, .wd-thead .wd-c-odds { display:none; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/tokens.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/primitives.jsx"></script>
<script type="text/babel" src="app/match-primitives.jsx"></script>
<script type="text/babel" src="app/wd-data.jsx"></script>
<script type="text/babel" src="app/wd-app-data.jsx"></script>
<script type="text/babel" src="app/wd-charts.jsx"></script>
<script type="text/babel" src="app/wd-dashboard.jsx"></script>
<script type="text/babel" src="app/wd-views-1.jsx"></script>
<script type="text/babel" src="app/wd-views-2.jsx"></script>

<script type="text/babel">
const { ACCENT } = window.COTA;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "chartStyle": "Barres",
  "period": "28 j",
  "chartAccent": "#e8ff36",
  "density": "Confort"
}/*EDITMODE-END*/;

const TITLES = {
  dash: 'Dashboard', predict: 'Prédictions', detail: 'Analyse', live: 'Live',
  compet: 'Compétitions', fav: 'Favoris', hist: 'Historique', stats: 'Statistiques',
  abo: 'Abonnement', parrain: 'Parrainage', profil: 'Profil',
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState('dash');
  const [detailId, setDetailId] = React.useState('rma-bay');
  const mainRef = React.useRef(null);

  const nav = (p) => { setPage(p); if (mainRef.current) mainRef.current.scrollTop = 0; window.scrollTo(0, 0); };
  const openDetail = (id) => { setDetailId(id); nav('detail'); };

  // L'élément de nav actif (le détail reste sous "Prédictions").
  const activeNav = page === 'detail' ? 'predict' : page;

  let view;
  switch (page) {
    case 'predict': view = <PredictionsView onOpen={openDetail} />; break;
    case 'detail':  view = <PredictionDetailView matchId={detailId} onBack={() => nav('predict')} />; break;
    case 'live':    view = <LiveView onOpen={openDetail} />; break;
    case 'compet':  view = <CompetitionsView />; break;
    case 'fav':     view = <FavoritesView onOpen={openDetail} />; break;
    case 'hist':    view = <HistoryView />; break;
    case 'stats':   view = <StatsView t={t} />; break;
    case 'abo':     view = <SubscriptionView />; break;
    case 'parrain': view = <ReferralView />; break;
    case 'profil':  view = <ProfileView onNav={nav} />; break;
    default:        view = <DashboardView t={t} onNav={nav} />;
  }

  return (
    <div className="wd-shell">
      <Sidebar user={window.WD_USER} active={activeNav} onNav={nav} />

      <main ref={mainRef} className={'wd-main' + (t.density === 'Compact' ? ' wd-compact' : '')}>
        {view}

        <TweaksPanel>
          <TweakSection label="Data-viz" />
          <TweakRadio label="Style du graphe" value={t.chartStyle} options={['Barres', 'Aire', 'Ligne']} onChange={(v) => setTweak('chartStyle', v)} />
          <TweakRadio label="Période" value={t.period} options={['7 j', '14 j', '28 j']} onChange={(v) => setTweak('period', v)} />
          <TweakColor label="Couleur du graphe" value={t.chartAccent} options={['#e8ff36', '#6fb4d9', '#3ddc91']} onChange={(v) => setTweak('chartAccent', v)} />
          <TweakSection label="Mise en page" />
          <TweakRadio label="Densité" value={t.density} options={['Confort', 'Compact']} onChange={(v) => setTweak('density', v)} />
        </TweaksPanel>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
