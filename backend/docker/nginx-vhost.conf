limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name cota.monghetto.com;

    # Laisser Certbot valider le domaine
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name cota.monghetto.com;

    # ── Certificats Let's Encrypt (générés par Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/cota.monghetto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cota.monghetto.com/privkey.pem;

    # ── Paramètres SSL modernes ──
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Bloquer les bots et scanners ──
    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab)) {
        return 444;
    }

    # ── Bloquer accès fichiers sensibles ──
    location ~* \.(env|git|sql|log|sh|key|pem)$ {
        return 403;
    }

    # ── Rate limit strict sur les routes d'auth (OTP) ──
    location ~* ^/api/auth/(send-otp|verify-otp|facebook) {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Toutes les autres routes ──
    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
