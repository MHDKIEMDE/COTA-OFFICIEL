services:

  # ── PHP-FPM — Laravel ────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cota-app
    restart: unless-stopped
    env_file: /var/www/cota-backend/.env
    volumes:
      - /var/www/cota-backend/.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - sqlite:/var/www/html/database
      - public:/var/www/html/public
    depends_on:
      - redis
    networks:
      - cota-network

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cota-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - storage:/var/www/html/storage:ro
      - public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - cota-network

  # ── Redis (cache + queues) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cota-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - cota-network

  # ── Queue Worker ──────────────────────────────────────────────────────────────
  queue:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cota-queue
    restart: unless-stopped
    env_file: /var/www/cota-backend/.env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - /var/www/cota-backend/.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - sqlite:/var/www/html/database
    depends_on:
      - redis
    networks:
      - cota-network

  # ── Scheduler (cron Laravel) ──────────────────────────────────────────────────
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cota-scheduler
    restart: unless-stopped
    env_file: /var/www/cota-backend/.env
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - /var/www/cota-backend/.env:/var/www/html/.env:ro
      - storage:/var/www/html/storage
      - sqlite:/var/www/html/database
    depends_on:
      - redis
    networks:
      - cota-network

volumes:
  storage:
  sqlite:
  public:
  redis-data:

networks:
  cota-network:
    driver: bridge
